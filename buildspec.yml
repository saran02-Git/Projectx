version: 0.2

phases:
  install:
    runtime-versions:
      docker: 20
    commands:
      - echo Installing Docker

  pre_build:
    commands:
      - echo Logging in to DockerHub
      - echo $DOCKER_PASSWORD | docker login -u $DOCKER_USERNAME --password-stdin

  build:
    commands:
      - echo Build started
      - docker build -t brain-app .
      - docker tag brain-app saran0702/brain-app:latest

  post_build:
    commands:
      - echo Pushing image
      - docker push saran0702/brain-app:latest
